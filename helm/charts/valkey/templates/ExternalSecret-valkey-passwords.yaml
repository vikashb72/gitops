apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-passwords
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: 4h
  secretStoreRef:
    name: external-vault-backend
    kind: ClusterSecretStore
  target:
    name: valkey-passwords
    creationPolicy: Owner
    deletionPolicy: "Retain"
    template:
      engineVersion: v2
      templateFrom:
        - target: Data
          literal: |-
            {{`{{- $creds := list }}`}}
            {{`{{- range $user, $pass := . }}`}}
            {{`{{ $user }}`}}: {{`{{ $pass }}`}}
            {{`{{- end }}`}}
  dataFrom:
    - extract:
        key: minikube/valkey/passwords 

schema:
  env: minikube

valkey:
  image:
    pullPolicy: IfNotPresent
  
  serviceAccount:
    create: true
    automount: false
  
  resources: {}

  initResources: {} 
  
  # Common labels to add to all resources (Deployment, Service, ConfigMap, etc.)
  commonLabels: {}
  
  dataStorage:
    enabled: false

  service:
    type: ClusterIP
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
  
  # Mount additional secrets into the Valkey container
  extraValkeySecrets: []
  
  # Mount additional configMaps into the Valkey container
  extraValkeyConfigs: []
  
  extraVolumes:
    - name: own-ca-bundle
      configMap:
        name: own-ca-bundle
        defaultMode: 0644
        optional: false
        items:
          - key: own-ca-bundle.pem
            path: ca-certificates.crt
    - name: valkey-users-acl
      secret:
        secretName: valkey-users-acl
        defaultMode: 0400
    #- name: compiled-acl-dir
    #  emptyDir: {}

  extraVolumeMounts:
    - mountPath: /etc/ssl/certs/
      name: own-ca-bundle
      readOnly: true
    #- name: valkey-users-acl
    #  readOnly: true
    #  subPath: users.acl
    #  mountPath: "/opt/bitnami/valkey/etc/users.acl"
    #- name: valkey-users-acl
    #  mountPath: /opt/valkey/acl-source # Where keys map to files automatically
    #- name: compiled-acl-dir
    #  mountPath: /etc/valkey            # Target location for compiled rules


  extraContainers:
    - name: acl-reloader
      image: valkey/valkey:8
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
      command:
        - sh
        - -c
        - |
          # Re-read password each cycle in case it rotates
          get_pass() { cat /valkey-users-secret/default; }

          # Wait for Valkey to accept connections before first reload
          echo "[acl-reloader] Waiting for Valkey..."
          until valkey-cli --tls \
              --cacert /etc/ssl/certs/ca-certificates.crt \
              -a "$(get_pass)" ping 2>/dev/null | grep -q PONG; do
            sleep 5
          done
          echo "[acl-reloader] Valkey ready. Watching /acl-source/acl.conf ..."

          PREV_HASH=""
          while true; do
            CURR_HASH=$(md5sum /acl-source/acl.conf 2>/dev/null | awk '{print $1}')
            if [ -n "$CURR_HASH" ] && [ "$CURR_HASH" != "$PREV_HASH" ]; then
              echo "[acl-reloader] Change detected (hash: $CURR_HASH), reloading ACL..."
              # File is 0400 owned by uid 1000 — owner can chmod
              chmod 0600 /etc/valkey/users.acl
              cp /acl-source/acl.conf /etc/valkey/users.acl
              chmod 0400 /etc/valkey/users.acl
              valkey-cli --tls \
                --cacert /etc/ssl/certs/ca-certificates.crt \
                -a "$(get_pass)" \
                ACL LOAD \
                && echo "[acl-reloader] ACL reloaded successfully" \
                || echo "[acl-reloader] ACL reload failed — will retry next cycle"
              PREV_HASH="$CURR_HASH"
            fi
            sleep 30
          done
      volumeMounts:
        - name: valkey-acl       # Chart's emptyDir — shared with main container
          mountPath: /etc/valkey
        - name: valkey-users-acl # ESO-generated ACL — K8s auto-updates this dir
          mountPath: /acl-source
          readOnly: true
        - name: own-ca-bundle    # CA cert for valkey-cli TLS
          mountPath: /etc/ssl/certs/
          readOnly: true
        - name: valkey-users-secret  # Chart-defined volume for existing secret
          mountPath: /valkey-users-secret
          readOnly: true

  # Content for valkey.conf (will be mounted via ConfigMap)
  valkeyConfig: ""
  
  auth:
    enabled: true
  
    # Use an existing secret for user passwords. Key defaults to username.
    usersExistingSecret: "valkey-passwords"
  
    # Map of users to create with ACL permissions.
    # If usersExistingSecret is set, passwords from the secret take priority over inline passwords.
    # NOTE: If using aclUsers, the 'default' user must be included here.
    aclUsers:
      default:
        permissions: "~* &* +@all"
      replicant:
        permissions: "~* &* +ping +psync +replconf"
      reader:
        permissions: "~* &* -@all +@read +ping +info"
      writer:
        permissions: "~* &* +@all -@admin -@dangerous"
  
    # Inline ACL configuration that will be appended after generated users.
    # NOTE: If using aclConfig, ensure the 'default' user is defined here.
    #aclConfig: |
    #  user default on >PLACEHOLDER ~* &* +@all
    #  user replicant on >PLACEHOLDER ~* &* +ping +psync +replconf
  
  # Replica configuration for master-replica replication mode
  replica:
    enabled: true
  
    # Number of replica instances (total pods = replicas + 1 master)
    replicas: 2
  
    replicationUser: "replicant"
  
    disklessSync: true
  
    # Persistence configuration (required for replicas)
    # Write safety - require minimum number of healthy replicas to accept writes
    minReplicasToWrite: 0
    minReplicasMaxLag: 10
  
    # Read service configuration
    service:
      enabled: true
      type: ClusterIP
      loadBalancerClass: ""
      loadBalancerSourceRanges: []
  
    # Persistence configuration (required for replicas)
    persistence:
      # Size of the PVC for each replica (required when replica.enabled is true)
      size: 8Gi
      storageClass: "nfs-client"
      accessModes:
        - ReadWriteOnce
  
  tls:
    enabled: true
    existingSecret: "valkey-tls"
    serverPublicKey: tls.crt
    serverKey: tls.key
    caPublicKey: ca.crt
    dhParamKey: ""
    requireClientCertificate: false
  
  # Valkey logging level: debug, verbose, notice, warning
  valkeyLogLevel: "debug" # "notice"
  
  # Environment variables to inject into Valkey container
  env: {}
    # Example:
    # LOG_LEVEL: info
  
  metrics:
    enabled: false
    exporter:
      image:
        pullPolicy: IfNotPresent
      extraVolumeMounts:
        - mountPath: /etc/ssl/certs/
          name: own-ca-bundle
          readOnly: true
      extraExporterSecrets: []
      # Environment variables to inject into the metrics exporter container
      extraEnvs: {}
      # Example:
      # LOG_LEVEL: info
  
    # Service configuration for the metrics exporter
    service:
      enabled: true
      type: ClusterIP
    serviceMonitor:
      enabled: false
    podMonitor:
      enabled: false
  
    # PrometheusRule configuration for alerting rules (used by kube-prometheus-stack)
    prometheusRule:
      enabled: false
      extraLabels: {}
      extraAnnotations: {}
      rules: []
      # Example alerting rules:
      # - alert: ValkeyDown
      #   annotations:

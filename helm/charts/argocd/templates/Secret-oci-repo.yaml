{{- range $key, $secret := $.Values.schema.oci }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    argocd.argoproj.io/secret-type: repository
  name: {{ $secret.name }}-helm-oci
  namespace: {{ $.Release.Namespace }}
stringData:
  url: {{ $secret.url }}
  name: {{ $secret.name }}
  type: helm
  enableOCI: "true"
---
{{- end }}
